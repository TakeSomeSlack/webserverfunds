<!DOCTYPE html>
<html>
<head>
    <title>Bird Feeder Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
        }

        .container {
            max-width: 600px;
            margin: auto;
            margin-top: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .warning {
            background: #ff4d4d;
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            display: none;
        }

        .status {
            font-size: 18px;
            text-align: left;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .feed { background: #4CAF50; color: white; }
        .refresh { background: #2196F3; color: white; }
        .gallery { background: #555; color: white; }
    </style>
</head>

<body>

<div class="container">

    <h1>Bird Feeder System</h1>

    <!-- WARNING BOX -->
    <div id="warningBox" class="warning"></div>

    <!-- STATUS -->
    <div class="card status" id="data">
        Loading...
    </div>

    <!-- VIDEO -->
    <div class="card" id="videoBox"></div>

    <!-- BUTTONS -->
    <div class="card">
        <button class="feed" onclick="sendCommand('F')">Feed</button>
        <button class="refresh" onclick="manualRefresh()">Refresh</button>
        <a href="gallery.php">
            <button class="gallery">Gallery</button>
        </a>
    </div>

</div>

<script>

let lastVideo = "";

// ==========================
// LOAD DATA (NO VIDEO RESET)
// ==========================
async function loadData(updateVideo = false) {
    try {
        let res = await fetch("get_data.php");
        let data = await res.json();

        // WARNING
        let warningBox = document.getElementById("warningBox");

        if (data.warning !== "") {
            warningBox.style.display = "block";
            warningBox.innerText = data.warning;
        } else {
            warningBox.style.display = "none";
        }

        // STATUS
        document.getElementById("data").innerHTML = `
            <b>Bird:</b> ${data.bird} <br>
            <b>Tray:</b> ${data.tray} <br>
            <b>Bin:</b> ${data.bin} <br>
            <b>Battery:</b> ${data.battery}% <br>
            <b>Time:</b> ${data.time}
        `;

        // VIDEO (ONLY UPDATE IF CHANGED)
        if (data.filename && (updateVideo || data.filename !== lastVideo)) {
            lastVideo = data.filename;

            document.getElementById("videoBox").innerHTML = `
                <video width="100%" controls>
                    <source src="/uploads/${data.filename}">
                </video>
            `;
        }

    } catch {
        document.getElementById("data").innerHTML = "Error loading data";
    }
}

// ==========================
// MANUAL REFRESH (FOR BUTTON)
// ==========================
function manualRefresh() {
    loadData(true); // forces video refresh
}

// ==========================
// COMMAND FUNCTION
// ==========================
function sendCommand(cmd) {
    fetch("send_command.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "cmd=" + cmd
    });
}

// ==========================
// AUTO REFRESH (NO VIDEO)
// ==========================
setInterval(() => loadData(false), 3000);

// INITIAL LOAD
loadData(true);

</script>

</body>
</html>
