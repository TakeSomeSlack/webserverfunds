<!DOCTYPE html>
<html>
<head>
    <title>Bird Feeder Control Panel</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 40px;
        }

        h1 {
            margin-bottom: 30px;
        }

        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        button {
            padding: 15px 25px;
            margin: 10px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #3b82f6;
            color: white;
            transition: 0.2s;
        }

        button:hover {
            background: #2563eb;
        }

        #output {
            margin-top: 20px;
            padding: 15px;
            background: black;
            border-radius: 10px;
            min-height: 50px;
            font-family: monospace;
            white-space: pre-wrap;
        }

        input {
            padding: 10px;
            border-radius: 8px;
            border: none;
            width: 200px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h1> Bird System Control</h1>

<div class="card">

    <h3>Quick Commands</h3>

    <button onclick="sendCommand('G')">Get Status</button>
    <button onclick="sendCommand('F')">Feed</button>
    <button onclick="sendCommand('R')">Reset</button>

    <h3>Custom Command</h3>

    <input type="text" id="cmdInput" placeholder="Enter command">
    <br>
    <button onclick="sendCustom()">Send</button>

    <div id="output">Response will appear here...</div>

</div>

<script>
async function sendCommand(cmd) {
    const output = document.getElementById("output");
    output.innerText = "Sending...";

    try {
        const res = await fetch("/send", {   // ✅ IMPORTANT: NO IP HERE
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ command: cmd })
        });

        const data = await res.json();

        output.innerText =
            "Command: " + data.command + "\n\nResponse:\n" +
            data.response.join("\n");

    } catch (err) {
        output.innerText = "ERROR: " + err;
        console.error(err);
    }
}

function sendCustom() {
    const cmd = document.getElementById("cmdInput").value;
    sendCommand(cmd);
}
</script>

</body>
</html>
