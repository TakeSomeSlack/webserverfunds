<!DOCTYPE html>
<html>
<head>
    <title>Bird Feeder Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #333;
        }

        .container {
            max-width: 700px;
            margin: auto;
            padding: 20px;
        }

        h1 {
            color: white;
            text-align: center;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .warning {
            background: red;
            color: white;
            padding: 15px;
            border-radius: 12px;
            display: none;
            font-weight: bold;
        }

        .buttons {
            display: flex;
            justify-content: space-around;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        .feed { background: #4CAF50; color: white; }
        .refresh { background: #2196F3; color: white; }

        video {
            width: 100%;
            border-radius: 12px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Bird Feeder System</h1>

    <div id="warningBox" class="warning"></div>

    <div class="card" id="data">Loading...</div>

    <div class="card" id="videoBox">No video</div>

    <div class="card buttons">
        <button class="feed" onclick="sendCommand('F')">Feed</button>
        <button class="refresh" onclick="refreshStatus()">Refresh Status</button>
        <a href="gallery.php"><button>Gallery</button></a>
    </div>

</div>

<script>

let lastVideo = "";

// ==========================
// LOAD DATA
// ==========================
async function loadData(updateVideo=false) {
    let res = await fetch("get_data.php");
    let data = await res.json();

    let warningBox = document.getElementById("warningBox");

    if (data.warning !== "") {
        warningBox.style.display = "block";
        warningBox.innerText = data.warning;
    } else {
        warningBox.style.display = "none";
    }

    document.getElementById("data").innerHTML = `
        Bird: ${data.bird} <br>
        Tray: ${data.tray} <br>
        Bin: ${data.bin} <br>
        Battery: ${data.battery}% <br>
        Time: ${data.time}
    `;

    if (data.filename && (updateVideo || data.filename !== lastVideo)) {
        lastVideo = data.filename;

        document.getElementById("videoBox").innerHTML = `
            <video controls>
                <source src="/uploads/${data.filename}">
            </video>
        `;
    }
}

// ==========================
// SEND COMMAND
// ==========================
function sendCommand(cmd) {
    fetch("send_command.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "cmd=" + cmd
    });
}

// ==========================
// REFRESH (WAKE + GET STATUS)
// ==========================
function refreshStatus() {

    // Step 1: Wake system
    sendCommand("W");

    // Step 2: Wait for wake
    setTimeout(() => {

        // Step 3: Request status
        sendCommand("G");

        // Step 4: Wait for response
        setTimeout(() => {
            loadData(true);
        }, 1500);

    }, 1000);
}

// INITIAL LOAD
loadData(true);

</script>

</body>
</html>
