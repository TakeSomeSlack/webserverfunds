<!DOCTYPE html>
<html>
<head>
    <title>Bird Feeder</title>
</head>

<body style="text-align:center; font-family: Arial; background-color: lightblue;">

<h1>Bird Feeder System</h1>

<div id="data">
    Loading...
</div>

<br>

<button onclick="sendCommand('F')">Feed</button>
<button onclick="sendCommand('G')">Get Status</button>

<br><br>

<a href="gallery.php">
    <button>View Gallery</button>
</a>

<script>

// ==========================
// LOAD DATA FROM SERVER
// ==========================
async function loadData() {
    try {
        let res = await fetch("get_data.php");
        let data = await res.json();

        document.getElementById("data").innerHTML = `
            Bird: ${data.bird} <br>
            Tray: ${data.tray} <br>
            Bin: ${data.bin} <br>
            Battery: ${data.battery}% <br>
            Time: ${data.time} <br><br>

            ${data.filename ? `
            <video width="300" controls>
                <source src="/uploads/${data.filename}">
            </video>
            ` : "No video yet"}
        `;
    } catch {
        document.getElementById("data").innerHTML = "Error loading data";
    }
}

// ==========================
// SEND COMMAND TO PI ZERO
// ==========================
function sendCommand(cmd) {
    fetch("send_command.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "cmd=" + cmd
    });
}

// ==========================
// AUTO REFRESH
// ==========================
setInterval(loadData, 3000);

// INITIAL LOAD
loadData();

</script>

</body>
</html>
