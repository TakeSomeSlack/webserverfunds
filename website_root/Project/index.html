<!DOCTYPE html>
<html>
<head>
    <title>Bird Feeder Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
        }

        .container {
            max-width: 600px;
            margin: auto;
            margin-top: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .warning {
            background: red;
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            display: none;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .feed { background: #4CAF50; color: white; }
        .refresh { background: #2196F3; color: white; }
    </style>
</head>

<body>

<div class="container">

    <h1>Bird Feeder System</h1>

    <div id="warningBox" class="warning"></div>

    <div class="card" id="data">Loading...</div>

    <div class="card" id="videoBox"></div>

    <div class="card">
        <button class="feed" onclick="sendCommand('F')">Feed</button>
        <button class="refresh" onclick="refreshStatus()">Refresh Status</button>
        <a href="gallery.php"><button>Gallery</button></a>
    </div>

</div>

<script>

let lastVideo = "";

// -------------------------
// LOAD DATA
// -------------------------
async function loadData(updateVideo=false) {
    let res = await fetch("get_data.php");
    let data = await res.json();

    // WARNING
    let warningBox = document.getElementById("warningBox");
    if (data.warning !== "") {
        warningBox.style.display = "block";
        warningBox.innerText = data.warning;
    } else {
        warningBox.style.display = "none";
    }

    // STATUS
    document.getElementById("data").innerHTML = `
        Bird: ${data.bird} <br>
        Tray: ${data.tray} <br>
        Bin: ${data.bin} <br>
        Battery: ${data.battery}% <br>
        Time: ${data.time}
    `;

    // VIDEO (no reset)
    if (data.filename && (updateVideo || data.filename !== lastVideo)) {
        lastVideo = data.filename;

        document.getElementById("videoBox").innerHTML = `
            <video width="100%" controls>
                <source src="/uploads/${data.filename}">
            </video>
        `;
    }
}

// -------------------------
// SEND COMMAND
// -------------------------
function sendCommand(cmd) {

    fetch("/webserverfunds/website_root/Project/send_command.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "cmd=" + cmd
    })
    .then(res => res.text())
    .then(data => console.log(data));
}

// -------------------------
// REFRESH STATUS (IMPORTANT)
// -------------------------
function refreshStatus() {
    sendCommand("G");

    // give Arduino time to respond, then reload
    setTimeout(() => loadData(true), 1500);
}

// AUTO UPDATE (NO VIDEO RESET)
setInterval(() => loadData(false), 3000);
loadData(true);

</script>

</body>
</html>
