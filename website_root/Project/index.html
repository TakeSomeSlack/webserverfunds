<!DOCTYPE html>
<html>
<head>
    <title>Bird Feeder</title>
</head>

<body style="background-color: lightblue; text-align:center;">

<h1> Bird Feeder Dashboard</h1>

<div id="data" style="font-size: 20px;">
    Loading...
</div>

<br>

<button onclick="sendCommand('F')">Feed</button>
<button onclick="sendCommand('G')">Get Status</button>
<button onclick="sendCommand('W')">Wake</button>

<br><br>
<a href="gallery.php">
    <button>View Video Gallery</button>
</a>

<script>

async function loadData() {
    try {
        let res = await fetch("get_data.php");
        let data = await res.json();

        document.getElementById("data").innerHTML = `
    Bird: ${data.bird} <br>
    Tray: ${data.tray} <br>
    Bin: ${data.bin} <br>
    Battery: ${data.battery}% <br>
    Time: ${data.time} <br><br>

    ${data.filename ? `
    <video width="300" controls>
        <source src="/uploads/${data.filename}">
    </video>
    ` : "No video yet"}
`;
    } catch {
        document.getElementById("data").innerHTML = "Error loading data";
    }
}

function sendCommand(cmd) {
    fetch("send_command.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "cmd=" + cmd
    });
}

setInterval(loadData, 3000);
loadData();

</script>

</body>
</html>
